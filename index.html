const go = h => { window.location.hash = h; };

window.addEventListener('hashchange', render);

// FIX: flag para evitar que onAuthStateChange e o load inicial renderizem em simultâneo
let _authReady = false;

window.addEventListener('load', async () => {
  const t = localStorage.getItem('bbc-theme');
  if (t === 'dark' || t === 'light') S.theme = t;
  applyTheme(false);

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    S.user = session.user;
    await loadProfile();
  }

  // FIX: onAuthStateChange só actua após o load inicial ter terminado
  _authReady = true;

  db.auth.onAuthStateChange(async (event, session) => {
    if (!_authReady) return;
    if (event === 'SIGNED_IN') {
      // Evitar re-render se já estávamos autenticados (e.g. refresh de token)
      if (S.user && S.user.id === session.user.id) return;
      S.user = session.user;
      await loadProfile();
      go('dashboard');
      await render();
    } else if (event === 'SIGNED_OUT') {
      S.user = null; S.profile = null; S.orders = [];
      go('');
      await render();
    }
  });

  hideLoading();
  await render();
});

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
}

async function loadProfile() {
  if (!S.user) return;
  const { data } = await db.from('profiles').select('*').eq('id', S.user.id).single();
  if (data) S.profile = data;
}

async function render() {
  const h = window.location.hash.replace('#','') || '';
  S.page = h;
  const app = document.getElementById('app');
  if (!app) return;

  if (!S.user) {
    if (h === 'registo') { app.innerHTML = tRegisto(); bindRegisto(); return; }
    if (h === 'login')   { app.innerHTML = tLogin();   bindLogin();   return; }
    app.innerHTML = tLanding(); return;
  }

  if (h === 'admin' && !S.profile?.is_admin) { go('dashboard'); return; }

  app.innerHTML = tShell();
  const m = document.getElementById('pm');
  if (!m) return;

  if      (h === 'dashboard')        { await loadOrders(); m.innerHTML = tDash(); }
  else if (h === 'novo-pedido')      { m.innerHTML = tNovoForm(); initStep(); }
  else if (h.startsWith('pedido-'))  { S.oid = h.replace('pedido-',''); await loadOrderDetail(); m.innerHTML = tDetail(); }
  else if (h === 'perfil')           { m.innerHTML = tPerfil(); }
  else if (h === 'admin')            { await loadAllOrders(); m.innerHTML = tAdmin(); }
  else                               { await loadOrders(); m.innerHTML = tDash(); }

  syncNav(); syncTbtn();
}

═══════════════════════════════════════════════ */
function toggleTheme() {
  S.theme = S.theme === 'light' ? 'dark' : 'light';
  applyTheme(true);
}
function applyTheme(save = true) {
  document.documentElement.setAttribute('data-theme', S.theme);
  if (save) localStorage.setItem('bbc-theme', S.theme);
  syncTbtn();
}
function syncTbtn() {
  const ico = S.theme === 'light' ? '🌙' : '☀️';
  document.querySelectorAll('.tbtn').forEach(b => b.textContent = ico);
}

/* ═══════════════════════════════════════════════
   SUPABASE — Operações de dados
═══════════════════════════════════════════════ */
async function loadOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*')
    .eq('user_id', S.user.id)
    .order('created_at', { ascending: false });
  if (!error) S.orders = data || [];
}

async function loadOrderDetail() {
  const { data } = await db.from('orders').select('*').eq('id', S.oid).single();
  if (data) {
    const idx = S.orders.findIndex(o => o.id === S.oid);
    if (idx !== -1) S.orders[idx] = data;
    else S.orders.push(data);
  }
}

async function loadAllOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*, profiles(name, email)')
    .order('created_at', { ascending: false });
  if (!error) S.orders = data || [];
}

async function updateOrder(id, payload) {
  const { error } = await db.from('orders').update(payload).eq('id', id);
  if (error) throw error;
}

async function uploadImage(file, orderId) {
  const ext = file.name.split('.').pop();
  const path = `${S.user.id}/${orderId || Date.now()}.${ext}`;
  const { error } = await db.storage.from('order-images').upload(path, file, { upsert: true });
  if (error) throw error;
  const { data } = db.storage.from('order-images').getPublicUrl(path);
  return data.publicUrl;
}

    btn.disabled = true; btn.textContent = 'A entrar...';
    const { error } = await db.auth.signInWithPassword({ email: em, password: pw });
    if (error) {

      showE('lg', error.message === 'Invalid login credentials'
        ? 'Email ou password incorretos'

  });
}

function bindRegisto() {
  syncTbtn();
  document.getElementById('rf').addEventListener('submit', async e => {
    e.preventDefault();
    const nm=v('rn'), em=v('re'), pw=v('rp'), pw2=v('rp2');
    hideE('rg'); let ok=true;
    if (!nm)                                { showE('rg','Nome obrigatório'); ok=false; }
    else if (!em||!/\S+@\S+\.\S+/.test(em)) { showE('rg','Email inválido'); ok=false; }
    else if (!pw||pw.length<6)              { showE('rg','Password: mínimo 6 caracteres'); ok=false; }
    else if (pw!==pw2)                      { showE('rg','As passwords não coincidem'); ok=false; }
    if (!ok) return;
    const btn = document.getElementById('rbtn');
    btn.disabled=true; btn.textContent='A criar conta...';
    const { error } = await db.auth.signUp({
      email: em, password: pw,
      options: { data: { name: nm } }
    });
    if (error) {
      btn.disabled=false; btn.textContent='Criar conta grátis';
      let msg = 'Erro: ' + error.message;
      if (error.message.includes('already registered') || error.message.includes('User already registered')) msg = 'Este email já está registado';
      else if (error.message.includes('Password should be')) msg = 'Password: mínimo 6 caracteres';
      else if (error.message.includes('Unable to validate')) msg = 'Email inválido';
      else if (error.message.includes('signup is disabled') || error.message.includes('Signups not allowed')) msg = 'Registos desativados no Supabase — ative em Authentication → Providers → Email';
      showE('rg', msg);
      return;
    }
    toast('Conta criada! Bem-vindo 🎉','ts');
    // FIX: onAuthStateChange redireciona automaticamente — não chamar go() aqui
  });
}

function tNovoForm() {

function initStep() {
  S.step = 1;
  S.editingId = null;
  // FIX: verificar que S.profile existe antes de usar os seus campos
  const p = S.profile || {};
  S.draft = {
    phone: p.phone || '',
    addr: {
      street:  p.street  || '',
      postal:  p.postal  || '',
      city:    p.city    || '',
      country: p.country || 'Portugal'
    },
    imgFile: null
  };
  drawStep();
}

function wizHTML() {
  const labs=['Produto','Detalhes','Entrega','Foto'];
  return `<div class="wiz">${labs.map((l,i)=>{
    const n=i+1,cls=n<S.step?'done':n===S.step?'active':'';
    return `<div class="wi ${cls}"><div class="wicol"><div class="wic">${n<S.step?'✓':n}</div><div class="wilb">${l}</div></div>${i<3?`<div class="wiln"></div>`:''}</div>`;
  }).join('')}</div>`;
}

function drawStep() {
  const W=document.getElementById('wiz'),C=document.getElementById('scon'),A=document.getElementById('sact');
  if(!W||!C||!A)return;
  W.innerHTML=wizHTML();
  const d=S.draft,a=d.addr||{};
  const countries=['Portugal','Espanha','França','Alemanha','Reino Unido','Itália','Brasil','Outro'];
  const isEdit = !!S.editingId;

  const html=[
    `<div class="step">
      <h3 style="font-size:16px;font-weight:800;margin-bottom:17px">Que produto pretende?</h3>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="fg"><label class="fl">Nome do produto *</label><input class="fi" id="fn" placeholder="Ex: Sapatilhas Nike Air Max 90" value="${ea(d.product_name||'')}"><div class="ferr hidden" id="fn-e"></div></div>
        <div class="fg"><label class="fl">Descrição <span style="font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label><textarea class="fi" id="fd" placeholder="Marca, modelo, onde viu...">${esc(d.description||'')}</textarea></div>
        <div class="fg"><label class="fl">Budget máximo (€) *</label><input class="fi" id="fb" type="number" min="1" placeholder="Ex: 150" value="${ea(d.budget||'')}"><div class="fhint">Valor máximo que está disposto a gastar</div><div class="ferr hidden" id="fb-e"></div></div>
      </div>
    </div>`,
    `<div class="step">
      <h3 style="font-size:16px;font-weight:800;margin-bottom:17px">Preferências do produto</h3>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="fg"><label class="fl">Cor ou modelo preferido *</label><input class="fi" id="fc" placeholder="Ex: Branco, Castanho mel..." value="${ea(d.color||'')}"><div class="ferr hidden" id="fc-e"></div></div>
        <div class="fg"><label class="fl">Tamanho <span style="font-weight:400;text-transform:none;letter-spacing:0">(se aplicável)</span></label><input class="fi" id="fz" placeholder="Ex: 42, M, 30x40cm..." value="${ea(d.size||'')}"></div>
        <div class="fg"><label class="fl">Telemóvel para contacto *</label><input class="fi" id="fph" type="tel" placeholder="+351 9XX XXX XXX" value="${ea(d.phone||'')}"><div class="ferr hidden" id="fph-e"></div></div>
      </div>
    </div>`,
    `<div class="step">
      <h3 style="font-size:16px;font-weight:800;margin-bottom:17px">Morada de entrega</h3>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="fg"><label class="fl">Rua / Morada *</label><input class="fi" id="fst" placeholder="Rua das Flores, nº 45, 3ºDto" value="${ea(a.street||'')}"><div class="ferr hidden" id="fst-e"></div></div>
        <div style="display:grid;grid-template-columns:1fr 2fr;gap:11px">
          <div class="fg"><label class="fl">Cód. postal *</label><input class="fi" id="fps" placeholder="4050-123" value="${ea(a.postal||'')}"><div class="ferr hidden" id="fps-e"></div></div>
          <div class="fg"><label class="fl">Cidade *</label><input class="fi" id="fct" placeholder="Porto" value="${ea(a.city||'')}"><div class="ferr hidden" id="fct-e"></div></div>
        </div>
        <div class="fg"><label class="fl">País</label><select class="fi ssel" id="fco" style="appearance:auto">${countries.map(c=>`<option value="${c}" ${(a.country||'Portugal')===c?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
    </div>`,
    `<div class="step">
      <h3 style="font-size:16px;font-weight:800;margin-bottom:7px">Foto de referência</h3>
      <p style="color:var(--tx2);font-size:14px;margin-bottom:17px">Envie uma foto do produto (PNG, JPG). Opcional mas muito útil!</p>
      <div class="upz" id="upz">
        <input type="file" id="fimg" accept="image/png,image/jpeg,image/webp" onchange="handleImg(event)">
        <div id="uphint"${d.imgPreview?' style="display:none"':''}><div style="font-size:36px;margin-bottom:10px">📸</div><div style="font-weight:700;margin-bottom:4px">Clique ou arraste uma imagem</div><div style="font-size:13px;color:var(--tx3)">PNG, JPG ou WEBP · máx. 5MB</div></div>
        ${d.imgPreview?`<img src="${d.imgPreview}" class="upprev">`:''}
      </div>
      <div style="margin-top:16px;padding:13px;background:var(--ac-lt);border-radius:var(--rs);font-size:14px;color:var(--ac-tx)">
        <strong>Resumo:</strong> ${esc(d.product_name||'—')} · €${d.budget||0} · ${esc(d.color||'—')} ${d.size?'· '+esc(d.size):''}

  ][S.step-1];

  C.innerHTML=html;

  if(S.step===4){
    const z=document.getElementById('upz');
    z?.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('dov');});
    z?.addEventListener('dragleave',()=>z.classList.remove('dov'));
    z?.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('dov');const f=e.dataTransfer.files[0];if(f)doImg(f);});
  }

  const submitLabel = isEdit ? '✓ Guardar alterações' : '✓ Submeter pedido';
  A.innerHTML=`
    ${S.step>1?`<button class="btn btn-s" onclick="chStep(-1)">← Anterior</button>`:''}
    ${S.step<4
      ? `<button class="btn btn-p" onclick="chStep(1)">Continuar →</button>`
      : `<button class="btn btn-p" id="sbtn" onclick="submitOrder()">${submitLabel}</button>`}
  `;
}

// FIX: ao recuar também guarda o passo actual para não perder dados
function chStep(dir) {
  if (dir > 0 && !valStep()) return;
  saveStep();
  S.step = Math.max(1, Math.min(4, S.step + dir));
  drawStep();
}

function valStep(){
  if(S.step===1){
    let ok=true;
    if(!v('fn')){showE('fn-e','Campo obrigatório');ok=false;}else hideE('fn-e');
    const b=v('fb');if(!b||isNaN(b)||Number(b)<=0){showE('fb-e','Valor inválido');ok=false;}else hideE('fb-e');
    return ok;
  }
  if(S.step===2){
    let ok=true;
    if(!v('fc')){showE('fc-e','Obrigatório');ok=false;}else hideE('fc-e');
    if(!v('fph')){showE('fph-e','Obrigatório');ok=false;}else hideE('fph-e');
    return ok;
  }
  if(S.step===3){
    let ok=true;
    [['fst','fst-e'],['fps','fps-e'],['fct','fct-e']].forEach(([id,eid])=>{if(!v(id)){showE(eid,'Obrigatório');ok=false;}else hideE(eid);});
    return ok;
  }
  return true;
}

function saveStep(){
  const d=S.draft;
  if(S.step===1){d.product_name=v('fn');d.description=v('fd');d.budget=v('fb');}
  else if(S.step===2){d.color=v('fc');d.size=v('fz');d.phone=v('fph');}
  else if(S.step===3){d.addr={street:v('fst'),postal:v('fps'),city:v('fct'),country:document.getElementById('fco')?.value||'Portugal'};}
}

function handleImg(e){const f=e.target.files[0];if(f)doImg(f);}
function doImg(file){
  if(file.size>5*1024*1024){toast('Imagem demasiado grande (máx. 5MB)','te');return;}
  S.draft.imgFile=file;
  const r=new FileReader();
  r.onload=e=>{
    S.draft.imgPreview=e.target.result;
    const h=document.getElementById('uphint');if(h)h.style.display='none';
    let p=document.querySelector('.upprev');
    if(!p){p=document.createElement('img');p.className='upprev';document.getElementById('upz')?.appendChild(p);}
    p.src=e.target.result;
    toast('Imagem carregada!','ts');
  };
  r.readAsDataURL(file);
}

// FIX: submitOrder unificado — distingue criação de edição via S.editingId
async function submitOrder() {
  saveStep();
  const d = S.draft;
  if (!d.product_name) { toast('Preencha os dados do produto','te'); S.step=1; drawStep(); return; }

  const btn = document.getElementById('sbtn');
  if (btn) { btn.disabled=true; btn.textContent='A guardar...'; }

  try {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { toast('Sessão expirada. Faça login novamente.','te'); go('login'); return; }

    const payload = {
      product_name: d.product_name,
      description:  d.description || '',
      budget:       d.budget ? Number(d.budget) : null,
      color:        d.color  || '',
      size:         d.size   || '',
      phone:        d.phone  || '',
      street:  (d.addr||{}).street  || '',
      postal:  (d.addr||{}).postal  || '',
      city:    (d.addr||{}).city    || '',
      country: (d.addr||{}).country || 'Portugal'
    };

    if (S.editingId) {
      // — EDIÇÃO —
      if (d.imgFile) {
        try { const url = await uploadImage(d.imgFile, S.editingId); payload.image_url = url; } catch(imgErr) { console.warn('Imagem não guardada:', imgErr); }
      }
      await updateOrder(S.editingId, payload);
      const idx = S.orders.findIndex(o => o.id === S.editingId);
      if (idx !== -1) Object.assign(S.orders[idx], payload);
      const targetId = S.editingId;
      S.editingId = null;
      S.draft = {};
      toast('Pedido atualizado!','ts');
      S.oid = targetId;
      go('pedido-' + targetId);
      await render();
    } else {
      // — CRIAÇÃO —
      payload.user_id = S.user.id;
      payload.status  = 'pending';
      const { data: orderData, error: orderError } = await db.from('orders').insert([payload]).select().single();
      if (orderError) throw orderError;
      if (d.imgFile) {
        try { const url = await uploadImage(d.imgFile, orderData.id); await updateOrder(orderData.id, { image_url: url }); } catch(imgErr) { console.warn('Imagem não guardada:', imgErr); }
      }
      S.draft = {};
      toast('Pedido submetido com sucesso! 🎉','ts');
      await loadOrders();
      go('dashboard');
      await render();
    }
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent= S.editingId ? '✓ Guardar alterações' : '✓ Submeter pedido'; }
    const msg = e?.message || e?.details || e?.hint || JSON.stringify(e);
    toast('Erro: ' + msg, 'te');
    console.error('submitOrder error:', e);
  }
}

/* ═══════════════════════════════════════════════
   DETALHE DO PEDIDO
═══════════════════════════════════════════════ */
function tDetail(){
  const o=S.orders.find(o=>o.id===S.oid);
  if(!o)return`<div class="empty"><div class="ei">🔍</div><div class="eh">Pedido não encontrado</div><button class="btn btn-p" onclick="go('dashboard')">Voltar</button></div>`;
  const canEdit=o.status==='pending'&&o.user_id===S.user.id;
  // FIX: passar o id como argumento explícito em vez de data-id+this (mais fiável cross-browser)
  return `
<div style="margin-bottom:16px"><button class="btn btn-g btn-sm" onclick="go('dashboard')">← Voltar</button></div>
<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:13px;margin-bottom:20px">
  <div><h1 class="pgh1">${esc(o.product_name)}</h1><div style="display:flex;align-items:center;gap:10px;margin-top:8px">${bdg(o.status)}<span style="color:var(--tx3);font-size:12px">Criado em ${fmtd(o.created_at)}</span></div></div>
  ${canEdit?`<div style="display:flex;gap:9px"><button class="btn btn-s btn-sm" onclick="editOrder('${esc(o.id)}')">✏️ Editar</button><button class="btn btn-d btn-sm" onclick="confirmDel('${esc(o.id)}')">🗑️ Apagar</button></div>`:''}
</div>
<div class="dgrid">
  <div>
    ${o.image_url?`<img src="${o.image_url}" class="dimg" alt="">`:`<div class="dimg" style="display:flex;align-items:center;justify-content:center;font-size:64px;min-height:190px">📦</div>`}
    ${o.description?`<div class="card" style="margin-top:13px"><div class="sl" style="margin-bottom:7px">Descrição</div><p style="font-size:14px;line-height:1.7;color:var(--tx2)">${esc(o.description)}</p></div>`:''}
  </div>
  <div class="card" style="height:fit-content">
    <h3 style="font-size:15px;font-weight:800;margin-bottom:13px">Detalhes</h3>
    <div class="dmeta">
      <div class="dr"><div class="dlb">Budget</div><div class="dv" style="color:var(--ac);font-family:'Cabinet Grotesk',sans-serif;font-size:17px;font-weight:800">€${Number(o.budget).toLocaleString('pt-PT')}</div></div>
      <div class="dr"><div class="dlb">Cor / Modelo</div><div class="dv">${esc(o.color||'—')}</div></div>
      ${o.size?`<div class="dr"><div class="dlb">Tamanho</div><div class="dv">${esc(o.size)}</div></div>`:''}
      <div class="dr"><div class="dlb">Telemóvel</div><div class="dv">${esc(o.phone||'—')}</div></div>
      <div class="dr"><div class="dlb">Morada</div><div class="dv" style="font-size:12px">${esc(o.street||'—')}<br>${esc(o.postal||'')} ${esc(o.city||'')}<br>${esc(o.country||'')}</div></div>
      <div class="dr"><div class="dlb">Estado</div><div class="dv">${bdg(o.status)}</div></div>
    </div>
  </div>
</div>`;
}

// FIX: editOrder reescrito — usa S.editingId, não window._eid; usa submitOrder unificado
function editOrder(id) {
  const o = S.orders.find(o => o.id === id);
  if (!o) return;

  S.editingId = id;
  S.draft = {
    ...o,
    addr: { street: o.street, postal: o.postal, city: o.city, country: o.country },
    imgPreview: o.image_url || null,
    imgFile: null
  };
  S.step = 1;

  const m = document.getElementById('pm');
  if (!m) return;
  m.innerHTML = `
    <div style="margin-bottom:16px"><button class="btn btn-g btn-sm" onclick="cancelEdit('${esc(id)}')">← Cancelar</button></div>
    <div class="pgh"><h1 class="pgh1">Editar pedido</h1></div>
    <div class="card" style="max-width:600px"><div id="wiz"></div><div id="scon"></div><div id="sact" style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px"></div></div>`;
  drawStep();
}

// FIX: função de cancelar edição separada e limpa
function cancelEdit(id) {
  S.editingId = null;
  S.draft = {};
  go('pedido-' + id);
}

function confirmDel(id) {
  showModal('Apagar pedido?','Esta ação não pode ser desfeita.',[
    {l:'Cancelar', c:'btn-s', fn: closeModal},
    {l:'Apagar',   c:'btn-d', fn: async () => {
      closeModal();
      try {
        const { error } = await db.from('orders').delete().eq('id', id);
        if (error) throw error;
        S.orders = S.orders.filter(o => o.id !== id);
        toast('Pedido apagado','ti');
        go('dashboard');
        await render();
      } catch(e) {
        console.error('deleteOrder error:', e);
        toast('Erro ao apagar: ' + (e?.message || e?.details || JSON.stringify(e)), 'te');
      }
    }}
  ]);
}

/* ═══════════════════════════════════════════════
   PERFIL
═══════════════════════════════════════════════ */
function tPerfil(){
  const p=S.profile||{};
  const ini=(p.name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const countries=['Portugal','Espanha','França','Alemanha','Reino Unido','Itália','Brasil','Outro'];
  return `
<div class="pgh"><h1 class="pgh1">O meu perfil</h1><p class="pgs">Gerencie as suas informações pessoais.</p></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:780px" id="pgrid">
  <div class="card">
    <div class="ph"><div class="av av-lg">${ini}</div><div><div class="pn">${esc(p.name||'')}</div><div class="pe">${esc(S.user?.email||'')}</div><div style="margin-top:6px">${p.is_admin?`<span class="badge bd2">Admin</span>`:`<span class="badge ba">Cliente</span>`}</div></div></div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="fg"><label class="fl">Nome completo</label><input class="fi" id="pn" type="text" value="${ea(p.name||'')}"></div>
      <div class="fg"><label class="fl">Telemóvel</label><input class="fi" id="pp" type="tel" placeholder="+351 9XX XXX XXX" value="${ea(p.phone||'')}"></div>
      <button class="btn btn-p" onclick="savePerfil()">Guardar alterações</button>
    </div>
  </div>
  <div class="card">
    <h3 style="font-size:15px;font-weight:800;margin-bottom:17px">Morada padrão</h3>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="fg"><label class="fl">Rua / Morada</label><input class="fi" id="pst" type="text" placeholder="Rua das Flores, nº 45" value="${ea(p.street||'')}"></div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:10px">
        <div class="fg"><label class="fl">Cód. Postal</label><input class="fi" id="pps" type="text" placeholder="4050-123" value="${ea(p.postal||'')}"></div>
        <div class="fg"><label class="fl">Cidade</label><input class="fi" id="pct" type="text" placeholder="Porto" value="${ea(p.city||'')}"></div>
      </div>
      <div class="fg"><label class="fl">País</label><select class="fi ssel" id="pco" style="appearance:auto">${countries.map(c=>`<option value="${c}" ${(p.country||'Portugal')===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <button class="btn btn-s" onclick="saveMorada()">Guardar morada</button>
    </div>
  </div>
</div>
<style>@media(max-width:600px){#pgrid{grid-template-columns:1fr!important}}</style>`;
}

// FIX: actualiza elementos da sidebar por id específico em vez de querySelector genérico
async function savePerfil(){
  const nm=v('pn'), ph=v('pp');
  try{
    const {error}=await db.from('profiles').update({name:nm||S.profile?.name, phone:ph}).eq('id',S.user.id);
    if(error)throw error;
    if(S.profile){ S.profile.name=nm||S.profile.name; S.profile.phone=ph; }
    toast('Perfil atualizado!','ts');
    const newName = S.profile?.name || '';
    const newIni = newName.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const unEl = document.getElementById('sb-un');
    if (unEl) unEl.textContent = newName;
    const avEl = document.getElementById('sb-av');
    if (avEl) avEl.textContent = newIni;
  }catch(e){ console.error('savePerfil error:',e); toast('Erro: '+(e?.message||e?.details||JSON.stringify(e)),'te'); }
}

async function saveMorada(){
  const payload={street:v('pst'),postal:v('pps'),city:v('pct'),country:document.getElementById('pco')?.value||'Portugal'};
  try{
    const {error}=await db.from('profiles').update(payload).eq('id',S.user.id);
    if(error)throw error;
    if(S.profile)Object.assign(S.profile,payload);
    toast('Morada guardada!','ts');
  }catch(e){ console.error('saveMorada error:',e); toast('Erro: '+(e?.message||e?.details||JSON.stringify(e)),'te'); }
}

/* ═══════════════════════════════════════════════
   PAINEL ADMIN
═══════════════════════════════════════════════ */
function tAdmin(){
  const all=S.orders;
  const p=all.filter(o=>o.status==='pending').length;
  const a=all.filter(o=>o.status==='analysis').length;
  const d=all.filter(o=>o.status==='done').length;
  return `
<div class="pgh"><h1 class="pgh1">Painel de Administração</h1><p class="pgs">Visão geral de todos os pedidos e clientes.</p></div>
<div class="sg4">
  <div class="sc4"><div class="sl">Total</div><div class="sv">${all.length}</div></div>
  <div class="sc4"><div class="sl">Pendentes</div><div class="sv" style="color:#92400e">${p}</div></div>
  <div class="sc4"><div class="sl">Em análise</div><div class="sv" style="color:#1e40af">${a}</div></div>
  <div class="sc4"><div class="sl">Concluídos</div><div class="sv" style="color:var(--ac)">${d}</div></div>
</div>
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:13px">
  <h2 style="font-size:16px;font-weight:800">Todos os pedidos</h2>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-p btn-sm" id="fa" onclick="filterA('')">Todos</button>
    <button class="btn btn-s btn-sm" id="fp" onclick="filterA('pending')">Pendentes</button>
    <button class="btn btn-s btn-sm" id="fan" onclick="filterA('analysis')">Em análise</button>
    <button class="btn btn-s btn-sm" id="fd" onclick="filterA('done')">Concluídos</button>
  </div>
</div>
${all.length===0
  ? `<div class="empty"><div class="ei">📭</div><div class="eh">Sem pedidos ainda</div></div>`
  : `<div id="alist" style="display:flex;flex-direction:column;gap:10px">${all.map(ac).join('')}</div>`
}`;
}

function ac(o){
  const prof=o.profiles||{};
  const userName=prof.name||'—';
  const userEmail=prof.email||'—';
  return `
<div class="ac2" id="ac-${o.id}">
  <div class="ah" onclick="toggleA('${o.id}')">
    <div class="oth">${o.image_url?`<img src="${o.image_url}" alt="">`:'📦'}</div>
    <div class="oin"><div class="on">${esc(o.product_name)}</div><div class="om">${esc(userName)} · ${fmtd(o.created_at)}</div></div>
    <div style="display:flex;align-items:center;gap:11px;flex-shrink:0">
      <span id="abadge-${o.id}">${bdg(o.status)}</span>
      <div class="opr">€${Number(o.budget||0).toLocaleString('pt-PT')}</div>
      <span id="ar-${o.id}" style="color:var(--tx3);font-size:16px;transition:transform .2s">›</span>
    </div>
  </div>
  <div class="ab" id="ab-${o.id}">
    ${o.image_url?`<img src="${o.image_url}" class="aimg" alt="">`:`<div style="height:80px;background:var(--bg-in);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:13px">📦</div>`}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:17px" id="ag-${o.id}">
      <div><div class="sl" style="margin-bottom:7px">Produto</div><div class="dmeta">
        <div class="dr"><div class="dlb">Nome</div><div class="dv">${esc(o.product_name)}</div></div>
        <div class="dr"><div class="dlb">Budget</div><div class="dv" style="color:var(--ac);font-weight:800">€${Number(o.budget||0).toLocaleString('pt-PT')}</div></div>
        <div class="dr"><div class="dlb">Cor</div><div class="dv">${esc(o.color||'—')}</div></div>
        ${o.size?`<div class="dr"><div class="dlb">Tamanho</div><div class="dv">${esc(o.size)}</div></div>`:''}
        ${o.description?`<div class="dr"><div class="dlb">Desc.</div><div class="dv" style="font-size:12px;text-align:left">${esc(o.description)}</div></div>`:''}
      </div></div>
      <div><div class="sl" style="margin-bottom:7px">Cliente</div><div class="dmeta">
        <div class="dr"><div class="dlb">Nome</div><div class="dv">${esc(userName)}</div></div>
        <div class="dr"><div class="dlb">Email</div><div class="dv"><a href="mailto:${ea(userEmail)}" style="color:var(--ac)">${esc(userEmail)}</a></div></div>
        <div class="dr"><div class="dlb">Tel.</div><div class="dv"><a href="tel:${ea(o.phone||'')}" style="color:var(--ac)">${esc(o.phone||'—')}</a></div></div>
        <div class="dr"><div class="dlb">Morada</div><div class="dv" style="font-size:12px">${esc(o.street||'—')}<br>${esc(o.postal||'')} ${esc(o.city||'')}, ${esc(o.country||'')}</div></div>
      </div></div>
    </div>
    <div style="margin-top:17px;padding-top:13px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:11px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:700;color:var(--tx3)">Alterar estado:</span>
      <select class="ssel" onchange="setStatus('${o.id}',this.value)">
        <option value="pending"   ${o.status==='pending'  ?'selected':''}>⏳ Pendente</option>
        <option value="analysis"  ${o.status==='analysis' ?'selected':''}>🔍 Em análise</option>
        <option value="done"      ${o.status==='done'     ?'selected':''}>✅ Concluído</option>
        <option value="cancelled" ${o.status==='cancelled'?'selected':''}>❌ Cancelado</option>
      </select>
    </div>
  </div>
</div>
<style>@media(max-width:560px){#ag-${o.id}{grid-template-columns:1fr!important}}</style>`;
}

// FIX: toggleA recebe id como argumento — não usa data-id+this
function toggleA(id){
  const b=document.getElementById('ab-'+id),r=document.getElementById('ar-'+id);
  const op=b.classList.toggle('open');
  if(r)r.style.transform=op?'rotate(90deg)':'';
}

// FIX: setStatus usa id específico do badge (#abadge-<id>) em vez de selector genérico
async function setStatus(id, st){
  try{
    const {error}=await db.from('orders').update({status:st}).eq('id',id);
    if(error)throw error;
    const o=S.orders.find(o=>o.id===id);
    if(o) o.status=st;
    // FIX: actualizar badge pelo id específico
    const badgeEl=document.getElementById('abadge-'+id);
    if(badgeEl) badgeEl.innerHTML=bdg(st);
    toast('Estado: '+stLbl(st),'ts');
  }catch(e){ console.error('setStatus error:',e); toast('Erro: '+(e?.message||e?.details||JSON.stringify(e)),'te'); }
}

// FIX: filterA aplica filtro sobre a lista já carregada, sem re-fetch desnecessário
async function filterA(st) {
  await loadAllOrders();
  const f = st ? S.orders.filter(o => o.status === st) : S.orders;
  const c = document.getElementById('alist');
  if (c) c.innerHTML = f.length
    ? f.map(ac).join('')
    : `<div class="empty"><div class="ei">📭</div><div class="eh">Sem pedidos aqui</div></div>`;
  [['fa',''],['fp','pending'],['fan','analysis'],['fd','done']].forEach(([id,s])=>{
    const el=document.getElementById(id);
    if(el) el.className = s===st ? 'btn btn-p btn-sm' : 'btn btn-s btn-sm';
  });
}

/* ═══════════════════════════════════════════════
   UTILITÁRIOS
═══════════════════════════════════════════════ */
const esc  = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ea   = s => esc(s);
const v    = id => { const el=document.getElementById(id); return el ? el.value.trim() : ''; };
const fmtd = d  => new Date(d).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'});
const stLbl= s  => ({pending:'Pendente',analysis:'Em análise',done:'Concluído',cancelled:'Cancelado'}[s]||s);

function bdg(status){
  const m={pending:'bp Pendente',analysis:'ba Em análise',done:'bd2 Concluído',cancelled:'bc Cancelado'};
  const [c,...rest]=(m[status]||'bp Pendente').split(' ');
  return `<span class="badge ${c}">${rest.join(' ')}</span>`;
}
function showE(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.remove('hidden');}}
function hideE(id)    {const el=document.getElementById(id);if(el)el.classList.add('hidden');}

function toast(msg,type='ti'){
  const icons={ts:'✅',te:'❌',ti:'ℹ️'};
  const c=document.getElementById('toasts');
  if(!c)return;
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span style="font-size:16px">${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation='tout .3s ease forwards';setTimeout(()=>t.remove(),300);},3500);
}

const _modalFns = {};
function showModal(title,body,btns=[]){
  Object.keys(_modalFns).forEach(k=>delete _modalFns[k]);
  btns.forEach((b,i)=>_modalFns['fn'+i]=b.fn);
  document.getElementById('modals').innerHTML=`
    <div class="mov" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>${esc(title)}</h3><p>${esc(body)}</p>
        <div class="mbtns">${btns.map((b,i)=>`<button class="btn ${b.c}" onclick="_modalFns['fn${i}']&&_modalFns['fn${i}']()">${b.l}</button>`).join('')}</div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modals').innerHTML='';}
</script>
